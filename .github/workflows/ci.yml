name: CI

on:
  push:
    branches: [main, develop, hardening]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rezerv
          POSTGRES_PASSWORD: rezerv
          POSTGRES_DB: rezerv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Validate migrations apply & reverse on Postgres (D2/D7/E3, reversibility)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://rezerv:rezerv@localhost:5432/rezerv_test
          SECRET_KEY: ci-throwaway-secret-not-used-for-anything-000000
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Run tests (incl. Postgres double-booking concurrency test)
        working-directory: backend
        env:
          # Enables the @pytest.mark.postgres concurrency + exclusion-constraint test.
          TEST_DATABASE_URL: postgresql+asyncpg://rezerv:rezerv@localhost:5432/rezerv_test
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
