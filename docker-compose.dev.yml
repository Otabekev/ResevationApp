version: "3.9"

# Use this for local development:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This overrides the backend/bot/frontend to run with hot-reload
# and exposes postgres + redis ports locally.

services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      ENVIRONMENT: development
    volumes:
      - ./backend:/app

  bot:
    command: python main.py
    environment:
      ENVIRONMENT: development

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
